name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @workspace/therassistant-ehr... run lint

      - name: Typecheck
        run: pnpm --filter @workspace/therassistant-ehr... run typecheck

      - name: Test
        run: pnpm --filter @workspace/therassistant-ehr... run test

      - name: Build
        run: pnpm --filter @workspace/therassistant-ehr... run build:ci
